<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record & Anchor Salary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: #f7f8fa;
        }

        .top-bar {
            background: #fff;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .tab-nav {
            display: flex;
            justify-content: center;
            list-style: none;
        }
        .tab-nav li {
            margin: 0 16px;
            font-size: 15px;
            color: #666;
            cursor: pointer;
            padding: 8px 0;
            position: relative;
            transition: 0.2s;
        }
        .tab-nav li.active {
            color: #000;
            font-weight: 500;
        }
        .tab-nav li.active::after {
            content: "";
            width: 24px;
            height: 3px;
            background: #000;
            border-radius: 2px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .filter-container {
            background: #fff;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .filter-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            color: #333;
        }
        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .filter-item {
            flex: 1;
            min-width: 140px;
        }
        .filter-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }
        .filter-input, .filter-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e5e6eb;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            background: #fafbfc;
        }
        .filter-btns {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .filter-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: none;
        }
        .btn-search { background: #000; color: #fff; }
        .btn-reset { background: #f2f3f5; color: #333; }

        .container { padding: 12px 16px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .empty-box { text-align: center; padding: 80px 0; color: #999; }

        /* 主播提现样式 */
        .salary-list {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .salary-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #f2f3f5;
            cursor: pointer;
        }
        .salary-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 12px;
        }
        .salary-info { flex: 1; }
        .salary-uid { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
        .salary-channel { font-size: 14px; color: #666; margin-bottom: 4px; }
        .salary-time { font-size: 12px; color: #999; }
        .salary-money { font-size: 16px; font-weight: 500; margin-right: 12px; white-space: nowrap; }
        .status { font-size: 13px; padding: 4px 10px; border-radius: 12px; font-weight: 500; }
        .status-wait { color: #666; background: #f2f3f5; }
        .status-success { color: #00b42a; background: #e6f7e9; }
        .status-reject { color: #ff4d4f; background: #fff1f0; }

        /* 钻石记录全新样式 */
        .diamond-record-list {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .diamond-record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            border-bottom: 1px solid #f5f5f5;
        }
        .diamond-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .diamond-title {
            font-size: 15px;
            font-weight: 500;
            color: #222;
        }
        .diamond-date {
            font-size: 12px;
            color: #999;
        }
        .diamond-number {
            font-size: 16px;
            font-weight: bold;
        }
        .diamond-in { color: #00b42a; } /* 绿色 + */
        .diamond-out { color: #ff4d4f; } /* 红色 - */

        /* 弹窗 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 999;
            align-items: center; justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: #fff; width: 85%; max-width: 400px;
            border-radius: 16px; padding: 28px; position: relative;
        }
        .modal-close {
            position: absolute; right: 20px; top: 20px;
            font-size: 22px; cursor: pointer;
        }
        .modal-title { text-align: center; font-size: 18px; font-weight: 500; margin-bottom: 24px; }
        .modal-row { display: flex; padding: 14px 0; border-bottom: 1px solid #f2f3f5; }
        .modal-label { width: 120px; color: #666; }
        .modal-value { flex: 1; text-align: right; font-weight: 500; }
        .btn-group { display: flex; gap: 12px; margin-top: 24px; }
        .btn { flex: 1; padding: 14px; border-radius: 10px; font-size: 15px; border: none; cursor: pointer; }
        .btn-reject { background: #ff4d4f; color: #fff; }
        .btn-success { background: #00b42a; color: #fff; }
        #bankNameRow { display: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <ul class="tab-nav">
        <li data-target="purchase">Purchase</li>
        <li data-target="recharge">Recharge</li>
        <li data-target="record">Record</li>
        <li data-target="anchorSalary" class="active">主播提现</li>
        <li data-target="diamondRecord">钻石记录</li>
    </ul>
</div>

<div class="container">
    <!-- 筛选栏：根据页面自动切换 -->
    <div class="filter-container">
        <div class="filter-title">筛选条件</div>
        <div class="filter-row">
            <div class="filter-item">
                <label class="filter-label">开始日期</label>
                <input type="date" id="startTime" class="filter-input">
            </div>
            <div class="filter-item">
                <label class="filter-label">结束日期</label>
                <input type="date" id="endTime" class="filter-input">
            </div>
        </div>

        <!-- 主播提现专用筛选：状态 -->
        <div class="filter-row" id="withdrawFilterRow">
            <div class="filter-item">
                <label class="filter-label">提现渠道</label>
                <select id="channelFilter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="银行卡">银行卡</option>
                    <option value="支付宝">支付宝</option>
                    <option value="微信">微信</option>
                </select>
            </div>
            <div class="filter-item">
                <label class="filter-label">处理状态</label>
                <select id="statusFilter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="wait">未处理</option>
                    <option value="success">已打款</option>
                    <option value="reject">已退回</option>
                </select>
            </div>
        </div>

        <!-- 钻石记录专用筛选：类型 -->
        <div class="filter-row" id="diamondFilterRow" style="display:none;">
            <div class="filter-item">
                <label class="filter-label">记录类型</label>
                <select id="diamondTypeFilter" class="filter-select">
                    <option value="all">全部</option>
                    <option value="income">收入钻石</option>
                    <option value="withdraw">提现钻石</option>
                </select>
            </div>
            <div class="filter-item" style="visibility:hidden;">
                <label class="filter-label">占位</label>
                <select class="filter-select"><option>空</option></select>
            </div>
        </div>

        <div class="filter-btns">
            <button class="filter-btn btn-reset" id="resetBtn">重置</button>
            <button class="filter-btn btn-search" id="searchBtn">搜索</button>
        </div>
    </div>

    <div class="tab-content" id="purchase"><div class="empty-box">No Data</div></div>
    <div class="tab-content" id="recharge"><div class="empty-box">No Data</div></div>
    <div class="tab-content" id="record"><div class="empty-box">No Data</div></div>
    
    <!-- 主播提现 -->
    <div class="tab-content active" id="anchorSalary">
        <div class="salary-list" id="salaryList"></div>
    </div>

    <!-- 钻石记录（全新样式） -->
    <div class="tab-content" id="diamondRecord">
        <div class="diamond-record-list" id="diamondList"></div>
    </div>
</div>

<!-- 提现弹窗 -->
<div class="modal" id="withdrawModal">
    <div class="modal-content">
        <div class="modal-close">✕</div>
        <div class="modal-title">提现详情</div>
        <div class="modal-row"><div class="modal-label">用户名</div><div class="modal-value" id="md-name"></div></div>
        <div class="modal-row"><div class="modal-label">用户ID</div><div class="modal-value" id="md-uid"></div></div>
        <div class="modal-row"><div class="modal-label">真实姓名</div><div class="modal-value" id="md-realname"></div></div>
        <div class="modal-row"><div class="modal-label">提现渠道</div><div class="modal-value" id="md-channel"></div></div>
        <div class="modal-row" id="bankNameRow"><div class="modal-label">银行名称</div><div class="modal-value" id="md-bank"></div></div>
        <div class="modal-row"><div class="modal-label">账号</div><div class="modal-value" id="md-account"></div></div>
        <div class="modal-row"><div class="modal-label">钻石数量</div><div class="modal-value" id="md-diamond"></div></div>
        <div class="btn-group" id="modalBtnGroup">
            <button class="btn btn-reject" id="rejectBtn">退回</button>
            <button class="btn btn-success" id="successBtn">已打款</button>
        </div>
    </div>
</div>

<script>
    // 主播提现数据
    let withdrawData = [
        {name:"用户1",uid:"UID100001",realname:"张一",channel:"银行卡",bank:"中国工商银行",account:"6222XXXX1001",diamond:3150,status:"wait",ts:1743470430000,time:"2025-05-01 09:20:30"},
        {name:"用户2",uid:"UID100002",realname:"李二",channel:"支付宝",bank:"",account:"138XXXX1002",diamond:2890,status:"success",ts:1743473420000,time:"2025-05-01 10:10:20"},
        {name:"用户3",uid:"UID100003",realname:"王三",channel:"微信",bank:"",account:"wx_XXXX1003",diamond:4200,status:"reject",ts:1743487810000,time:"2025-05-01 14:30:10"},
        {name:"用户4",uid:"UID100004",realname:"赵四",channel:"银行卡",bank:"招商银行",account:"6214XXXX1004",diamond:3680,status:"wait",ts:1743554450000,time:"2025-05-02 08:40:50"}
    ];

    // 钻石记录数据（收入+支出）
    let diamondData = [
        {type:"income", user:"用户A", title:"收到钻石", diamond:12000, ts:1743470000000, time:"2025-05-01 09:00:00"},
        {type:"income", user:"用户B", title:"收到钻石", diamond:8500, ts:1743471000000, time:"2025-05-01 09:10:00"},
        {type:"withdraw", user:"用户1", title:"提现钻石", diamond:3150, ts:1743470430000, time:"2025-05-01 09:20:30"},
        {type:"withdraw", user:"用户2", title:"提现钻石", diamond:2890, ts:1743473420000, time:"2025-05-01 10:10:20"},
        {type:"income", user:"用户C", title:"收到钻石", diamond:15000, ts:1743560000000, time:"2025-05-02 10:00:00"}
    ];

    // DOM
    const startTimeEl = document.getElementById('startTime');
    const endTimeEl = document.getElementById('endTime');
    const channelFilterEl = document.getElementById('channelFilter');
    const statusFilterEl = document.getElementById('statusFilter');
    const diamondTypeFilterEl = document.getElementById('diamondTypeFilter');
    const withdrawFilterRow = document.getElementById('withdrawFilterRow');
    const diamondFilterRow = document.getElementById('diamondFilterRow');
    const modalBtnGroup = document.getElementById('modalBtnGroup');
    let currentWithdrawItem = null;

    // ------------------------------
    // 渲染 主播提现
    // ------------------------------
    function renderWithdrawList(list) {
        const el = document.getElementById('salaryList');
        el.innerHTML = '';
        list.forEach(item => {
            let statusText = {wait:'未处理', success:'已打款', reject:'已退回'}[item.status];
            let statusClass = `status-${item.status}`;
            el.innerHTML += `
            <div class="salary-item" data-uid="${item.uid}">
                <img src="https://picsum.photos/seed/${item.uid}/100/100" class="salary-avatar">
                <div class="salary-info">
                    <div class="salary-uid">${item.uid}</div>
                    <div class="salary-channel">渠道：${item.channel}</div>
                    <div class="salary-time">${item.time}</div>
                </div>
                <div class="salary-money">${item.diamond} 💎</div>
                <div class="status ${statusClass}">${statusText}</div>
            </div>`;
        });

        // 绑定点击弹窗
        document.querySelectorAll('.salary-item').forEach((item, i) => {
            item.onclick = () => {
                currentWithdrawItem = list[i];
                openWithdrawModal(currentWithdrawItem);
            };
        });
    }

    // ------------------------------
    // 渲染 钻石记录（全新样式）
    // ------------------------------
    function renderDiamondList(list) {
        const el = document.getElementById('diamondList');
        el.innerHTML = '';
        list.forEach(item => {
            const isIn = item.type === 'income';
            let titleText = item.title;
            if (isIn) {
                titleText = `收到用户${item.user}的钻石`;
            }
            const numHtml = isIn 
                ? `<span class="diamond-number diamond-in">+${item.diamond}💎</span>`
                : `<span class="diamond-number diamond-out">-${item.diamond}💎</span>`;

            el.innerHTML += `
            <div class="diamond-record-item">
                <div class="diamond-left">
                    <div class="diamond-title">${titleText}</div>
                    <div class="diamond-date">${item.time}</div>
                </div>
                ${numHtml}
            </div>`;
        });
    }

    // ------------------------------
    // 筛选逻辑
    // ------------------------------
    function doFilter() {
        const st = startTimeEl.value;
        const et = endTimeEl.value;
        const start = st ? new Date(st+' 00:00:00').getTime() : null;
        const end = et ? new Date(et+' 23:59:59').getTime() : null;

        // 筛选提现
        const wf = withdrawData.filter(item => {
            const timeOk = !start || item.ts >= start;
            const timeOk2 = !end || item.ts <= end;
            const channelOk = channelFilterEl.value === 'all' || item.channel === channelFilterEl.value;
            const statusOk = statusFilterEl.value === 'all' || item.status === statusFilterEl.value;
            return timeOk && timeOk2 && channelOk && statusOk;
        });

        // 筛选钻石
        const df = diamondData.filter(item => {
            const timeOk = !start || item.ts >= start;
            const timeOk2 = !end || item.ts <= end;
            const typeOk = diamondTypeFilterEl.value === 'all' || item.type === diamondTypeFilterEl.value;
            return timeOk && timeOk2 && typeOk;
        });

        renderWithdrawList(wf);
        renderDiamondList(df);
    }

    function resetFilter() {
        startTimeEl.value = '';
        endTimeEl.value = '';
        channelFilterEl.value = 'all';
        statusFilterEl.value = 'all';
        diamondTypeFilterEl.value = 'all';
        doFilter();
    }

    // ------------------------------
    // 提现弹窗
    // ------------------------------
    const modal = document.getElementById('withdrawModal');
    function openWithdrawModal(item) {
        document.getElementById('md-name').innerText = item.name;
        document.getElementById('md-uid').innerText = item.uid;
        document.getElementById('md-realname').innerText = item.realname;
        document.getElementById('md-channel').innerText = item.channel;
        document.getElementById('md-bank').innerText = item.bank || '-';
        document.getElementById('md-account').innerText = item.account;
        document.getElementById('md-diamond').innerText = item.diamond + ' 💎';
        bankNameRow.style.display = item.channel === '银行卡' ? 'flex' : 'none';

        // 已打款/已退回 隐藏按钮
        if (item.status === 'success' || item.status === 'reject') {
            modalBtnGroup.style.display = 'none';
        } else {
            modalBtnGroup.style.display = 'flex';
        }

        modal.classList.add('show');
    }
    document.querySelector('.modal-close').onclick = () => modal.classList.remove('show');
    modal.onclick = e => e.target === modal && modal.classList.remove('show');

    // 已打款 / 退回
    document.getElementById('successBtn').onclick = () => {
        if(currentWithdrawItem) currentWithdrawItem.status = 'success';
        modal.classList.remove('show'); doFilter();
    };
    document.getElementById('rejectBtn').onclick = () => {
        if(currentWithdrawItem) currentWithdrawItem.status = 'reject';
        modal.classList.remove('show'); doFilter();
    };

    // ------------------------------
    // Tab 切换 + 筛选栏自动切换
    // ------------------------------
    document.querySelectorAll('.tab-nav li').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab-nav li').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.target;
            document.getElementById(target).classList.add('active');

            // 切换筛选栏显示
            if(target === 'anchorSalary'){
                withdrawFilterRow.style.display = 'flex';
                diamondFilterRow.style.display = 'none';
            }else if(target === 'diamondRecord'){
                withdrawFilterRow.style.display = 'none';
                diamondFilterRow.style.display = 'flex';
            }else{
                withdrawFilterRow.style.display = 'none';
                diamondFilterRow.style.display = 'none';
            }
        };
    });

    // 绑定按钮
    document.getElementById('searchBtn').onclick = doFilter;
    document.getElementById('resetBtn').onclick = resetFilter;

    // 初始化
    renderWithdrawList(withdrawData);
    renderDiamondList(diamondData);
</script>
</body>
</html>
